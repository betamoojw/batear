## IDF Component Manager manifest for the Batear main component.
## Run `idf.py update-dependencies` after cloning to fetch RadioLib.

dependencies:
  idf: ">=5.0"

  espressif/esp-dsp:
    version: ">=1.4.0"

  ## RadioLib — SX1262 / LoRa driver (https://github.com/jgromes/RadioLib)
  ## Component registry: https://components.espressif.com/components/jgromes/radiolib
  jgromes/radiolib:
    version: ">=6.6.0"

  ## ESP-MQTT: built-in on ESP-IDF <=5.x, removed from core in v6.0.
  espressif/mqtt:
    version: "*"
    rules:
      - if: "idf_version >=6.0.0"
